name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            deb: true
            rpm: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            deb: true
            rpm: true
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross for Linux
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@cross

      - name: Build Binary
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
          
      - name: Create Tarball
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf tui-center-${{ matrix.target }}.tar.gz tui-center
          
      - name: Install Packaging Tools
        if: matrix.deb || matrix.rpm
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build DEB Package
        if: matrix.deb
        run: |
          cargo deb --target ${{ matrix.target }} --no-build --no-strip
          cp target/${{ matrix.target }}/debian/*.deb target/${{ matrix.target }}/release/ || true
          
      - name: Build RPM Package
        if: matrix.rpm
        run: |
          # The RPM builder needs the payload specified in Cargo.toml [package.metadata.generate-rpm]
          cargo generate-rpm --target ${{ matrix.target }} -o target/${{ matrix.target }}/release/tui-center-${{ matrix.target }}.rpm
          
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            target/${{ matrix.target }}/release/*.tar.gz
            target/${{ matrix.target }}/release/*.deb
            target/${{ matrix.target }}/release/*.rpm
